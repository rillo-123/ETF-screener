<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETF Discovery Dashboard</title>
    <!-- Add Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <!-- Add simple Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .ticker-card:hover {
        transform: scale(1.02);
        transition: 0.1s;
        cursor: pointer;
      }
    </style>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <nav class="bg-slate-900 border-b border-indigo-500/30 p-4">
      <div class="px-6 flex justify-between items-center text-white">
        <h1
          class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent"
        >
          ETF Discovery Lab
        </h1>
        <div class="flex items-center space-x-4">
          <div class="flex items-center">
            <button
              onclick="toggleStrategyPanel()"
              class="bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded-l-lg border border-indigo-500/50 flex items-center transition-all"
            >
              <svg
                class="w-5 h-5 mr-1"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                ></path>
              </svg>
              Labs
            </button>
            <select
              id="strategy-select"
              onchange="updateEditorContent(this.value)"
              class="bg-slate-800 text-white p-2 rounded-r-lg border border-l-0 border-indigo-500/50 min-w-[200px]"
            >
              <option value="">-- No Active Strategy --</option>
              {% for strat in strategies %}
              <option value="{{ strat }}">{{ strat }}</option>
              {% endfor %}
            </select>
          </div>
          <select
            id="ticker-select"
            class="bg-slate-800 text-white p-2 rounded-lg border border-indigo-500/50"
          >
            <option value="">Select Ticker...</option>
            {% for ticker in tickers %}
            <option value="{{ ticker }}">{{ ticker }}</option>
            {% endfor %}
          </select>
          <div class="flex rounded-md shadow-sm" role="group">
            <button
              type="button"
              onclick="setRange(365)"
              class="px-4 py-2 text-sm font-medium text-white bg-slate-800 border border-slate-700 rounded-s-lg hover:bg-slate-700"
            >
              1Y
            </button>
            <button
              type="button"
              onclick="setRange(365 * 2)"
              class="px-4 py-2 text-sm font-medium text-white bg-slate-800 border-y border-x border-slate-700 hover:bg-slate-700"
            >
              2Y
            </button>
            <button
              type="button"
              onclick="setRange(365 * 5)"
              class="px-4 py-2 text-sm font-medium text-white bg-slate-800 border border-slate-700 rounded-e-lg hover:bg-slate-700"
            >
              5Y
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="w-full flex gap-6 px-6 mt-6 pb-12">
      <!-- Sidebar for matching tickers -->
      <aside class="w-80 flex flex-col gap-4 overflow-hidden shrink-0">
        <div
          class="bg-white shadow-xl rounded-xl p-4 overflow-hidden max-h-[65vh] border-t-4 border-indigo-500 flex flex-col"
        >
          <h2
            class="text-lg font-bold mb-4 text-slate-800 border-b pb-2 flex justify-between items-center"
          >
            Top Matches
            <span
              id="match-count"
              class="text-xs bg-indigo-100 text-indigo-800 px-2 py-1 rounded-full"
              >0</span
            >
          </h2>
          <div
            id="ticker-list"
            class="space-y-2 pb-6 overflow-y-auto flex-1 h-full"
          >
            <!-- Ticker list items will appear here -->
            <div class="text-sm text-slate-400 italic">
              No matches... run screen
            </div>
          </div>
        </div>

        <!-- Error/Failed Tickers Section -->
        <div
          id="error-section"
          class="hidden bg-white shadow-lg rounded-xl p-4 border-t-4 border-red-400 flex flex-col flex-1 overflow-hidden max-h-[25vh]"
        >
          <h3 class="text-sm font-bold text-red-600 mb-2 flex justify-between">
            Failed to Load
            <span id="error-count" class="bg-red-50 text-red-600 px-1.5 rounded"
              >0</span
            >
          </h3>
          <div
            id="error-list"
            class="text-[10px] text-slate-500 overflow-y-auto font-mono"
          ></div>
        </div>
      </aside>

      <!-- Main Chart Display -->
      <main class="flex-1 min-w-0">
        <div
          id="chart-card"
          class="bg-white shadow-xl rounded-xl p-4 h-[85vh] flex flex-col border border-indigo-100 mb-8 overflow-hidden relative"
        >
          <!-- Strategy Pop-out Window -->
          <div
            id="strategy-panel"
            class="hidden absolute top-0 right-0 w-[450px] h-full bg-slate-900 shadow-2xl z-50 transform transition-transform border-l border-indigo-500/30 flex flex-col"
          >
            <div
              class="p-4 border-b border-indigo-500/20 flex justify-between items-center bg-slate-800"
            >
              <h3 class="text-white font-bold flex items-center">
                <span class="bg-indigo-600 rounded p-1 mr-2"
                  ><svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    ></path></svg
                ></span>
                STRATEGY LAB
              </h3>
              <button
                onclick="toggleStrategyPanel()"
                class="text-slate-400 hover:text-white"
              >
                &times; CLOSE
              </button>
            </div>
            <div class="flex-1 p-4 flex flex-col overflow-hidden">
              <div class="flex justify-between items-end mb-2">
                <div class="flex-1 mr-2">
                  <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Strategy Name</label>
                  <input 
                    id="strategy-filename" 
                    type="text" 
                    placeholder="my_new_strat"
                    class="w-full bg-slate-800 text-white text-xs p-2 rounded border border-indigo-500/20 focus:border-indigo-500 outline-none"
                  >
                </div>
                <button 
                  onclick="saveStrategy()"
                  class="bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] font-bold py-2 px-3 rounded transition-all flex items-center"
                >
                  <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                  SAVE
                </button>
              </div>

              <label class="text-[10px] font-bold text-slate-500 uppercase mb-2">Editor (DSL Format)</label>
              <textarea
                id="strategy-editor"
                class="flex-1 bg-slate-950 text-indigo-300 font-mono text-sm p-4 rounded border border-indigo-500/20 focus:border-indigo-400 outline-none resize-none"
                spellcheck="false"
                placeholder="# Hardened Trend Strategy
TRIGGER: cross_up(macd, macd_signal) 
FILTER:  close > ema_50 AND volume > 100K
EXIT:    cross_down(macd, macd_signal) OR close < ema_50"
              ></textarea>

              <div class="mt-4 flex gap-2">
                <button
                  onclick="applyDsl()"
                  class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded transition-all active:scale-95 flex items-center justify-center text-sm"
                >
                  <svg
                    class="w-4 h-4 mr-2"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      d="M5 13l4 4L19 7"
                      stroke-width="3"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    ></path>
                  </svg>
                  RUN THIS LOGIC
                </button>
              </div>
            </div>
          </div>

          <div
            id="chart-header"
            class="mb-4 flex justify-between items-center h-12 flex-shrink-0"
          >
            <h2
              id="active-ticker-title"
              class="text-3xl font-bold text-slate-900 tracking-tight text-ellipsis overflow-hidden whitespace-nowrap mr-4"
            >
              Select a Ticker
            </h2>
            <div
              id="chart-stats"
              class="text-emerald-600 font-mono text-xl flex space-x-4 items-center flex-shrink-0"
            >
              <!-- Scanner Progress Area -->
              <div id="scanner-progress-container" class="hidden flex items-center space-x-3 bg-slate-100 px-3 py-1.5 rounded-lg border border-indigo-100">
                <div class="w-24 h-2 bg-slate-200 rounded-full overflow-hidden">
                  <div id="scanner-progress-bar" class="h-full bg-indigo-500 transition-all duration-300" style="width: 0%"></div>
                </div>
                <span id="scanner-progress-text" class="text-[10px] text-slate-500 font-bold min-w-[30px]">0%</span>
                <button 
                  onclick="cancelScan()" 
                  class="text-red-500 hover:text-red-700 p-1 rounded-full hover:bg-red-50 transition-colors"
                  title="Cancel Scan"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
              </div>

              <!-- Dynamic stats like price/streak will go here -->
              <div id="loading-spinner" class="hidden">
                <div
                  class="animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600"
                ></div>
              </div>
              <button
                id="scan-btn"
                onclick="runScreen()"
                class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2 px-4 rounded-lg transition-all shadow-lg shadow-indigo-200 active:scale-95"
              >
                Run Scanner
              </button>
            </div>
          </div>
          <div
            id="plotly-chart"
            class="flex-grow w-full bg-slate-50 rounded-lg border border-dashed border-indigo-200 overflow-hidden"
          >
            <div
              class="flex flex-col items-center justify-center h-full text-indigo-300"
            >
              <svg
                class="w-16 h-16 opacity-20"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"
                ></path>
              </svg>
              <p class="mt-4 font-medium italic">
                Your interactive workspace is ready
              </p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      let currentDays = 365 * 2;
      let currentTicker = "";
      let currentStrategy = "";
      let scanAbortController = null;

      // UI Helpers
      function toggleStrategyPanel() {
        const panel = document.getElementById("strategy-panel");
        panel.classList.toggle("hidden");
      }

      async function updateEditorContent(strategyName) {
        if (!strategyName) {
          document.getElementById("strategy-editor").value = "";
          document.getElementById("strategy-filename").value = "";
          return;
        }
        try {
          const resp = await fetch(`/api/strategy/${strategyName}`);
          const data = await resp.json();
          document.getElementById("strategy-editor").value = data.content;
          document.getElementById("strategy-filename").value = strategyName;
        } catch (err) {
          console.error("Failed to load strategy", err);
        }
      }

      async function saveStrategy() {
        const name = document.getElementById("strategy-filename").value;
        const content = document.getElementById("strategy-editor").value;
        
        if (!name || !content) {
          alert("Need both a name and some DSL code!");
          return;
        }

        try {
          const resp = await fetch('/api/strategy/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, content })
          });
          const res = await resp.json();
          if (res.status === 'success') {
            alert("Saved! Refreshing browser...");
            location.reload(); // Refresh to update the dropdown
          } else {
            alert("Error: " + res.detail);
          }
        } catch (err) {
          alert("Failed to save: " + err);
        }
      }

      async function applyDsl() {
        // Extract current DSL from editor and pass it to runScreen
        const dsl = document.getElementById("strategy-editor").value;
        if (!dsl.trim()) {
          alert("Please enter strategy DSL before applying.");
          return;
        }
        toggleStrategyPanel();
        // Pass true to indicate we're using custom DSL from active editor
        runScreen(dsl);
      }

      // Initial Load
      function cancelScan() {
        if (scanAbortController) {
          scanAbortController.abort();
          resetScanUI();
        }
      }

      function resetScanUI() {
        const spinner = document.getElementById("loading-spinner");
        const scanBtn = document.getElementById("scan-btn");
        const list = document.getElementById("ticker-list");
        const progressContainer = document.getElementById("scanner-progress-container");
        
        spinner.classList.add("hidden");
        progressContainer.classList.add("hidden");
        scanBtn.textContent = "Run Scanner";
        scanBtn.classList.add("bg-indigo-600");
        scanBtn.classList.remove("bg-indigo-400");
        scanBtn.disabled = false;
        list.style.opacity = "1.0";
        scanAbortController = null;
      }

      async function runScreen(customDsl = null) {
        const list = document.getElementById("ticker-list");
        const spinner = document.getElementById("loading-spinner");
        const scanBtn = document.getElementById("scan-btn");
        const strategySelect = document.getElementById("strategy-select");
        const errorSection = document.getElementById("error-section");
        const errorList = document.getElementById("error-list");
        const progressContainer = document.getElementById("scanner-progress-container");
        const progressBar = document.getElementById("scanner-progress-bar");
        const progressText = document.getElementById("scanner-progress-text");

        // Set up abortion
        scanAbortController = new AbortController();

        spinner.classList.remove("hidden");
        progressContainer.classList.remove("hidden");
        progressBar.style.width = "0%";
        progressText.textContent = "0%";
        
        scanBtn.textContent = "Scanning...";
        scanBtn.classList.add("bg-indigo-400"); // De-emphasize while running
        scanBtn.classList.remove("bg-indigo-600");
        scanBtn.disabled = true;
        list.style.opacity = "0.5";

        try {
          let url = "/api/screen";
          if (customDsl) {
            url += `?dsl_content=${encodeURIComponent(customDsl)}`;
            strategySelect.value = "";
          } else if (strategySelect.value) {
            url += `?strategy=${strategySelect.value}`;
          }

          // Fake progress since we wait for one big JSON result from backend
          // We'll tick it up slowly to give a sense of depth
          let fakeProg = 0;
          const progInterval = setInterval(() => {
             if (fakeProg < 95) {
                fakeProg += (95 - fakeProg) * 0.1;
                progressBar.style.width = `${Math.round(fakeProg)}%`;
                progressText.textContent = `${Math.round(fakeProg)}%`;
             }
          }, 400);

          const resp = await fetch(url, { signal: scanAbortController.signal });
          clearInterval(progInterval);
          
          const rawData = await resp.json();
          console.log("Scanner complete. Results:", rawData);

          // Complete the bar
          progressBar.style.width = "100%";
          progressText.textContent = "100%";
          
          // Small delay to let user see 100%
          await new Promise(r => setTimeout(r, 500));
          progressContainer.classList.add("hidden");
          resetScanUI();

          // Handle new response format
          const hasFormat = rawData.matches !== undefined;
          const matches = hasFormat ? rawData.matches : rawData;
          const errors = hasFormat ? rawData.errors : [];

          list.innerHTML = "";
          document.getElementById("match-count").textContent = matches.length;

          // Update ticker dropdown options based on screen results
          const tickerSelect = document.getElementById("ticker-select");
          if (matches.length > 0 && (strategySelect.value || customDsl)) {
            const currentVal = tickerSelect.value;
            tickerSelect.innerHTML =
              '<option value="">Select Ticker...</option>';
            matches.forEach((item) => {
              const opt = document.createElement("option");
              opt.value = item.ticker;
              opt.textContent = item.ticker;
              tickerSelect.appendChild(opt);
            });
            if (
              currentVal &&
              matches.some((item) => item.ticker === currentVal)
            ) {
              tickerSelect.value = currentVal;
            }
          }

          // Display errors if any
          if (errors && errors.length > 0) {
            errorSection.classList.remove("hidden");
            document.getElementById("error-count").textContent =
              rawData.total_errors || errors.length;
            errorList.innerHTML = errors
              .map(
                (err) => `
                        <div class="mb-1 border-b border-slate-50 pb-1">
                            <span class="font-bold text-slate-700">${err.ticker}</span>: 
                            <span class="text-red-400 capitalize">${err.error}</span>
                        </div>
                    `,
              )
              .join("");
          } else {
            errorSection.classList.add("hidden");
          }

          if (matches.length === 0) {
            list.innerHTML =
              '<div class="text-sm text-slate-400 italic p-4 text-center">No matching ETFs found for this strategy...</div>';
          }

          matches.forEach((item) => {
            const card = document.createElement("div");
            card.className =
              "ticker-card p-3 bg-slate-50 border-l-4 border-indigo-500 rounded shadow-sm hover:shadow-md hover:bg-indigo-50 cursor-pointer transition-all";
            card.onclick = () => loadChart(item.ticker);
            const statusText = item.status || "TRENDING";
            const statusColor =
              item.status === "Entry Signal"
                ? "text-emerald-500 animate-pulse font-bold"
                : "text-indigo-600";

            const changeVal = item.change_pct
              ? item.change_pct.toFixed(2)
              : "0.00";
            const changeColor =
              parseFloat(changeVal) >= 0 ? "text-emerald-500" : "text-rose-500";
            const sign = parseFloat(changeVal) >= 0 ? "+" : "";

            card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div class="flex flex-col">
                                <span class="font-bold text-slate-800 text-lg leading-none">${item.ticker}</span>
                                <span class="text-[10px] ${statusColor} mt-1 uppercase tracking-wider">${statusText}</span>
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="text-slate-800 font-bold font-mono">${item.close.toFixed(2)}€</span>
                                <span class="text-[10px] ${changeColor} font-mono">${sign}${changeVal}%</span>
                            </div>
                        </div>
                        <div class="mt-2 pt-2 border-t border-slate-200/50 flex justify-between items-center">
                            <div class="text-[10px] text-slate-400 font-semibold">
                                ${(item.volume / 1000).toFixed(0)}K VOLUME
                            </div>
                            <div class="text-[10px] font-bold ${item.return_pct >= 0 ? "text-emerald-600" : "text-rose-600"}">
                                ${item.return_pct.toFixed(1)}% Rtn
                            </div>
                        </div>
                    `;
            list.appendChild(card);
          });
        } catch (err) {
          console.error(err);
          list.innerHTML =
            '<div class="text-xs text-red-500 p-2">Screen error. Check console.</div>';
        } finally {
          spinner.classList.add("hidden");
          scanBtn.textContent = "Run Scanner";
          scanBtn.disabled = false;
          list.style.opacity = "1";
        }
      }

      async function loadChart(ticker) {
        console.log("loadChart starting for", ticker);
        currentTicker = ticker;
        document.getElementById("active-ticker-title").textContent =
          `${ticker} - Supertrend breakdown analysis`;
        document.getElementById("ticker-select").value = ticker;

        const chartDiv = document.getElementById("plotly-chart");
        chartDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
                    <div id="loading-status" class="text-indigo-600 font-medium text-sm animate-pulse uppercase tracking-widest text-center">
                        Fetching live data for ${ticker}...
                    </div>
                </div>
            `;

        try {
          const url = `/api/chart/${ticker}?days=${currentDays}`;
          const resp = await fetch(url);
          const responseData = await resp.json();

          if (!resp.ok) throw new Error(responseData.detail || "Server error");

          let figData = responseData.figure
            ? typeof responseData.figure === "string"
              ? JSON.parse(responseData.figure)
              : responseData.figure
            : responseData;

          // Reset responsive layout
          figData.layout.autosize = true;
          figData.layout.width = undefined;
          figData.layout.height = undefined;
          figData.layout.margin = { l: 60, r: 20, t: 30, b: 80 };
          figData.layout.paper_bgcolor = "#ffffff";
          figData.layout.plot_bgcolor = "#ffffff";

          // FORCE AXES VISIBILITY
          Object.keys(figData.layout).forEach((key) => {
            if (key.startsWith("xaxis")) {
              figData.layout[key].showticklabels = true;
              figData.layout[key].visible = true;
              if (key === "xaxis") figData.layout[key].side = "bottom";
              figData.layout[key].tickfont = {
                size: 11,
                color: "#334155",
                weight: "bold",
              };
            }
          });

          chartDiv.innerHTML = "";
          await Plotly.newPlot(chartDiv, figData.data, figData.layout, {
            responsive: true,
            displaylogo: false,
            scrollZoom: true,
          });
        } catch (err) {
          console.error("loadChart error:", err);
          chartDiv.innerHTML = `<div class="p-8 text-center text-red-500">${err.message}</div>`;
        }
      }

      function setRange(days) {
        currentDays = days;
        if (currentTicker) loadChart(currentTicker);
      }

      document
        .getElementById("ticker-select")
        .addEventListener("change", (e) => {
          if (e.target.value) loadChart(e.target.value);
        });

      document
        .getElementById("strategy-select")
        .addEventListener("change", (e) => {
          updateEditorContent(e.target.value);
          runScreen();
        });

      // Initialize
      runScreen();

      function testMe() {
        const dsl = document.getElementById("strategy-editor").value;
        alert("Prototype Working!\n\nCurrent Editor Text:\n" + dsl);
      }

    </script>
  </body>
</html>
