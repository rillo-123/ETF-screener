<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF Discovery Dashboard</title>
    <!-- Add Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <!-- Add simple Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ticker-card:hover { transform: scale(1.02); transition: 0.1s; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-slate-900 border-b border-indigo-500/30 p-4">
        <div class="px-6 flex justify-between items-center text-white">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">ETF Discovery Lab</h1>
            <div class="flex items-center space-x-4">
                <select id="ticker-select" class="bg-slate-800 text-white p-2 rounded-lg border border-indigo-500/50">
                    <option value="">Select Ticker...</option>
                    {% for ticker in tickers %}
                    <option value="{{ ticker }}">{{ ticker }}</option>
                    {% endfor %}
                </select>
                <div class="flex rounded-md shadow-sm" role="group">
                    <button type="button" onclick="setRange(365)" class="px-4 py-2 text-sm font-medium text-white bg-slate-800 border border-slate-700 rounded-s-lg hover:bg-slate-700">1Y</button>
                    <button type="button" onclick="setRange(365*2)" class="px-4 py-2 text-sm font-medium text-white bg-slate-800 border-y border-x border-slate-700 hover:bg-slate-700">2Y</button>
                    <button type="button" onclick="setRange(365*5)" class="px-4 py-2 text-sm font-medium text-white bg-slate-800 border border-slate-700 rounded-e-lg hover:bg-slate-700">5Y</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="w-full flex gap-6 px-6 mt-6 pb-12">
        <!-- Sidebar for matching tickers -->
        <aside class="w-80 bg-white shadow-xl rounded-xl p-4 overflow-y-auto max-h-[85vh] border-t-4 border-indigo-500 shrink-0">
            <h2 class="text-lg font-bold mb-4 text-slate-800 border-b pb-2 flex justify-between items-center">
                Top Matches
                <span id="match-count" class="text-xs bg-indigo-100 text-indigo-800 px-2 py-1 rounded-full">0</span>
            </h2>
            <div id="ticker-list" class="space-y-2 pb-6">
                <!-- Ticker list items will appear here -->
                <div class="text-sm text-slate-400 italic">No matches... run screen</div>
            </div>
        </aside>

        <!-- Main Chart Display -->
        <main class="flex-1 min-w-0">
            <div id="chart-card" class="bg-white shadow-xl rounded-xl p-4 h-[85vh] flex flex-col border border-indigo-100 mb-8 overflow-hidden">
                <div id="chart-header" class="mb-4 flex justify-between items-center h-12 flex-shrink-0">
                    <h2 id="active-ticker-title" class="text-3xl font-bold text-slate-900 tracking-tight text-ellipsis overflow-hidden whitespace-nowrap mr-4">Select a Ticker</h2>
                    <div id="chart-stats" class="text-emerald-600 font-mono text-xl flex space-x-6 items-center flex-shrink-0">
                        <!-- Dynamic stats like price/streak will go here -->
                        <div id="loading-spinner" class="hidden">
                            <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600"></div>
                        </div>
                        <button onclick="runScreen()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2 px-4 rounded-lg transition-all shadow-lg shadow-indigo-200 active:scale-95">
                            Run Scanner
                        </button>
                    </div>
                </div>
                <div id="plotly-chart" class="flex-grow w-full bg-slate-50 rounded-lg border border-dashed border-indigo-200 overflow-hidden">
                    <div class="flex flex-col items-center justify-center h-full text-indigo-300">
                        <svg class="w-16 h-16 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path>
                        </svg>
                        <p class="mt-4 font-medium italic">Your interactive workspace is ready</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentDays = 365 * 2;
        let currentTicker = "";

        // Initial Load
        async function runScreen() {
            const list = document.getElementById('ticker-list');
            const spinner = document.getElementById('loading-spinner');
            
            spinner.classList.remove('hidden');
            list.style.opacity = '0.5';
            
            try {
                const resp = await fetch('/api/screen');
                const data = await resp.json();
                
                list.innerHTML = '';
                document.getElementById('match-count').textContent = data.length;
                
                if (data.length === 0) {
                    list.innerHTML = '<div class="text-sm text-slate-400 italic p-4 text-center">No trending ETFs found...</div>';
                }
                
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "ticker-card p-3 bg-slate-50 border-l-4 border-indigo-500 rounded shadow-sm hover:shadow-md hover:bg-indigo-50 cursor-pointer";
                    card.onclick = () => loadChart(item.ticker);
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-slate-800 text-lg">${item.ticker}</span>
                            <span class="text-emerald-600 font-bold font-mono tracking-tighter">${item.close.toFixed(2)}€</span>
                        </div>
                        <div class="text-xs text-slate-500 mt-1 uppercase font-semibold flex justify-between">
                            <span>${(item.volume/1000).toFixed(0)}K VOL</span>
                            <span class="text-indigo-600">TRENDING</span>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                list.innerHTML = '<div class="text-xs text-red-500 p-2">Screen error. Check console.</div>';
            } finally {
                spinner.classList.add('hidden');
                list.style.opacity = '1';
            }
        }

        async function loadChart(ticker) {
            console.log("loadChart starting for", ticker);
            currentTicker = ticker;
            document.getElementById('active-ticker-title').textContent = `${ticker} - Supertrend breakdown analysis`;
            document.getElementById('ticker-select').value = ticker;
            
            const chartDiv = document.getElementById('plotly-chart');
            chartDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
                    <div id="loading-status" class="text-indigo-600 font-medium text-sm animate-pulse uppercase tracking-widest text-center">
                        Fetching live data for ${ticker}...
                    </div>
                </div>
            `;
            
            try {
                const url = `/api/chart/${ticker}?days=${currentDays}`;
                const resp = await fetch(url);
                const responseData = await resp.json();
                
                if (!resp.ok) throw new Error(responseData.detail || "Server error");
                
                let figData = (responseData.figure) ? 
                    (typeof responseData.figure === 'string' ? JSON.parse(responseData.figure) : responseData.figure) : 
                    responseData;

                // Reset responsive layout
                figData.layout.autosize = true;
                figData.layout.width = undefined; 
                figData.layout.height = undefined; 
                figData.layout.margin = { l: 60, r: 20, t: 30, b: 80 }; 
                figData.layout.paper_bgcolor = '#ffffff';
                figData.layout.plot_bgcolor = '#ffffff';
                
                // FORCE AXES VISIBILITY
                Object.keys(figData.layout).forEach(key => {
                    if (key.startsWith('xaxis')) {
                        figData.layout[key].showticklabels = true;
                        figData.layout[key].visible = true;
                        if (key === 'xaxis') figData.layout[key].side = 'bottom';
                        figData.layout[key].tickfont = { size: 11, color: '#334155', weight: 'bold' }; 
                    }
                });

                chartDiv.innerHTML = '';
                await Plotly.newPlot(chartDiv, figData.data, figData.layout, { 
                    responsive: true,
                    displaylogo: false,
                    scrollZoom: true
                });
            } catch (err) {
                console.error("loadChart error:", err);
                chartDiv.innerHTML = `<div class="p-8 text-center text-red-500">${err.message}</div>`;
            }
        }

        function setRange(days) {
            currentDays = days;
            if (currentTicker) loadChart(currentTicker);
        }

        document.getElementById('ticker-select').addEventListener('change', (e) => {
            if (e.target.value) loadChart(e.target.value);
        });

        // Initialize 
        runScreen();
    </script>
</body>
</html>
