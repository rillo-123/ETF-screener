<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETF Discovery Dashboard</title>
  <!-- Add Plotly.js -->
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <!-- Add simple Tailwind for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .ticker-card:hover {
      transform: scale(1.02);
      transition: 0.1s;
      cursor: pointer;
    }

    /* Keep Plotly modebar clear of the top chart/header edge and give it a border. */
    #plotly-chart .modebar-container {
      top: 0.25rem !important;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 2px;
      background: rgba(255,255,255,0.9);
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen">
  <nav class="bg-slate-900 border-b border-indigo-500/30 p-4">
    <div class="px-6 flex justify-between items-center text-white">
      <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
        ETF Discovery Lab
      </h1>
      <div class="flex items-center space-x-4">
        <div class="flex items-center">
          <button onclick="toggleStrategyPanel()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded-l-lg border border-indigo-500/50 flex items-center transition-all">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
              </path>
            </svg>
            Labs
          </button>
          <select id="strategy-select" onchange="updateEditorContent(this.value)"
            class="bg-slate-800 text-white p-2 border border-l-0 border-indigo-500/50 min-w-[200px]">
            <option value="">-- No Active Strategy --</option>
            {% for strat in strategies %}
            <option value="{{ strat }}">{{ strat }}</option>
            {% endfor %}
          </select>
          <button id="run-btn" onclick="runScreen()"
            class="bg-green-600 hover:bg-green-500 text-white text-xs font-bold py-2 px-3 border border-l-0 border-green-500/60 transition-all flex items-center whitespace-nowrap"
            title="Run the selected strategy">
            <svg class="w-3.5 h-3.5 mr-1" fill="currentColor" viewBox="0 0 24 24">
              <path d="M5 3l14 9-14 9V3z" />
            </svg>
            Run
          </button>
          <button id="modify-btn" onclick="modifyStrategy()"
            class="bg-amber-500 hover:bg-amber-400 text-white text-xs font-bold py-2 px-3 rounded-r-lg border border-amber-400/60 transition-all flex items-center whitespace-nowrap"
            title="Open strategy in editor to modify and save as a new file">
            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
              </path>
            </svg>
            Modify
          </button>
          <div id="nav-scan-progress"
            class="hidden ml-2 flex items-center gap-2 bg-slate-800/80 border border-indigo-500/30 rounded px-2 py-1">
            <div class="w-16 h-1.5 bg-slate-700 rounded-full overflow-hidden">
              <div id="nav-scan-progress-bar" class="h-full bg-emerald-400 transition-all duration-300"
                style="width: 0%"></div>
            </div>
            <span id="nav-scan-progress-text" class="text-[10px] text-emerald-200 font-bold min-w-[30px]">0%</span>
          </div>
        </div>
        <select id="ticker-select" class="bg-slate-800 text-white p-2 rounded-lg border border-indigo-500/50">
          <option value="">Select Ticker...</option>
          {% for ticker in tickers %}
          <option value="{{ ticker }}">{{ ticker }}</option>
          {% endfor %}
        </select>
        <div class="flex rounded-md shadow-sm" role="group">
          <button type="button" onclick="setRange(365)"
            class="px-4 py-2 text-sm font-medium text-white bg-slate-800 border border-slate-700 rounded-s-lg hover:bg-slate-700">
            1Y
          </button>
          <button type="button" onclick="setRange(365 * 2)"
            class="px-4 py-2 text-sm font-medium text-white bg-slate-800 border-y border-x border-slate-700 hover:bg-slate-700">
            2Y
          </button>
          <button type="button" onclick="setRange(365 * 5)"
            class="px-4 py-2 text-sm font-medium text-white bg-slate-800 border border-slate-700 rounded-e-lg hover:bg-slate-700">
            5Y
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="w-full flex gap-6 px-6 mt-6 pb-12">
    <!-- Sidebar for matching tickers -->
    <aside class="w-80 flex flex-col gap-4 overflow-hidden shrink-0">
      <div
        class="bg-white shadow-xl rounded-xl p-4 overflow-hidden max-h-[65vh] border-t-4 border-indigo-500 flex flex-col">
        <h2 class="text-lg font-bold mb-4 text-slate-800 border-b pb-2 flex justify-between items-center">
          Top Matches
          <span id="match-count" class="text-xs bg-indigo-100 text-indigo-800 px-2 py-1 rounded-full">0</span>
        </h2>
        <div id="ticker-list" class="space-y-2 pb-6 overflow-y-auto flex-1 h-full">
          <!-- Ticker list items will appear here -->
          <div class="text-sm text-slate-400 italic">
            No matches... run screen
          </div>
        </div>
      </div>

      <!-- Error/Failed Tickers Section -->
      <div id="error-section"
        class="hidden bg-white shadow-lg rounded-xl p-4 border-t-4 border-red-400 flex flex-col flex-1 overflow-hidden max-h-[25vh]">
        <h3 class="text-sm font-bold text-red-600 mb-2 flex justify-between">
          Failed to Load
          <span id="error-count" class="bg-red-50 text-red-600 px-1.5 rounded">0</span>
        </h3>
        <div id="error-list" class="text-[10px] text-slate-500 overflow-y-auto font-mono"></div>
      </div>
    </aside>

    <!-- Main Chart Display -->
    <main class="flex-1 min-w-0">
      <div id="chart-card"
        class="bg-white shadow-xl rounded-xl p-4 h-[85vh] flex flex-col border border-indigo-100 mb-8 overflow-hidden relative">
        <!-- Strategy Pop-out Window -->
        <div id="strategy-panel"
          class="hidden absolute top-0 right-0 w-[450px] h-full bg-slate-900 shadow-2xl z-50 transform transition-transform border-l border-indigo-500/30 flex flex-col">
          <div class="p-4 border-b border-indigo-500/20 flex justify-between items-center bg-slate-800">
            <div class="flex flex-col">
              <h3 class="text-white font-bold flex items-center">
                <span class="bg-indigo-600 rounded p-1 mr-2"><svg class="w-4 h-4" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" stroke-width="2" stroke-linecap="round"
                      stroke-linejoin="round"></path>
                  </svg></span>
                STRATEGY LAB
              </h3>
              <div id="source-strategy-badge" class="hidden mt-1 ml-7 text-[10px] text-amber-300 font-mono">
                Modifying: <span id="source-strategy-name" class="font-bold"></span>
              </div>
            </div>
            <button onclick="toggleStrategyPanel()" class="text-slate-400 hover:text-white">
              &times; CLOSE
            </button>
          </div>
          <div class="flex-1 p-4 flex flex-col overflow-hidden">
            <div class="flex justify-between items-end mb-2">
              <div class="flex-1 mr-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Strategy Name</label>
                <input id="strategy-filename" type="text" placeholder="my_new_strat"
                  class="w-full bg-slate-800 text-white text-xs p-2 rounded border border-indigo-500/20 focus:border-indigo-500 outline-none">
              </div>
              <div class="flex flex-col gap-1">
                <button onclick="saveAsStrategy()"
                  class="bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] font-bold py-2 px-3 rounded transition-all flex items-center whitespace-nowrap"
                  title="Save with new name (preserves original)">
                  <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"
                      stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                  </svg>
                  SAVE AS
                </button>
                <button id="overwrite-btn" onclick="saveStrategy()"
                  class="hidden bg-amber-600 hover:bg-amber-500 text-white text-[10px] font-bold py-1.5 px-3 rounded transition-all flex items-center whitespace-nowrap"
                  title="Overwrite the original strategy file">
                  OVERWRITE
                </button>
              </div>
            </div>

            <textarea id="strategy-editor"
              class="w-full flex-1 bg-slate-950 text-indigo-200 font-mono text-xs p-3 rounded border border-indigo-500/20 focus:border-indigo-400 focus:outline-none resize-none"
              spellcheck="false" placeholder="TRIGGER: close > ema_50
FILTER:  supertrend < close
ENTRY:   cross_up(close, ema_50)
EXIT:    cross_down(close, ema_50)"></textarea>

            <div class="mt-4 flex gap-2">
              <button onclick="applyDsl()"
                class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded transition-all active:scale-95 flex items-center justify-center text-sm">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                RUN THIS LOGIC
              </button>
            </div>
          </div>
        </div>

        <div id="chart-header" class="mb-4 flex justify-between items-center h-12 flex-shrink-0">
          <h2 id="active-ticker-title"
            class="text-3xl font-bold text-slate-900 tracking-tight text-ellipsis overflow-hidden whitespace-nowrap mr-4">
            Select a Ticker
          </h2>
          <div id="chart-stats" class="text-emerald-600 font-mono text-xl flex space-x-4 items-center flex-shrink-0">
            <!-- Dynamic stats like price/streak will go here -->
            <div id="loading-spinner" class="hidden">
              <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600"></div>
            </div>
          </div>
        </div>
        <div id="layer-legend"
          class="mb-3 flex flex-wrap items-center gap-3 rounded-lg border border-slate-200 bg-white/80 px-3 py-2 text-[11px] font-semibold text-slate-600">
          <span class="uppercase tracking-wide text-slate-500">Layer Shading</span>
          <span class="inline-flex items-center gap-1.5"><span class="h-2.5 w-2.5 rounded-sm bg-blue-600"></span>Context</span>
          <span class="inline-flex items-center gap-1.5"><span class="h-2.5 w-2.5 rounded-sm bg-amber-500"></span>Setup</span>
          <span class="inline-flex items-center gap-1.5"><span class="h-2.5 w-2.5 rounded-sm bg-emerald-600"></span>Trigger</span>
          <span class="inline-flex items-center gap-1.5"><span class="h-2.5 w-2.5 rounded-sm bg-red-600"></span>Risk</span>
          <span class="text-slate-400">Shown when strategy layers are evaluable on chart data.</span>
        </div>
        <div id="plotly-chart"
          class="flex-grow w-full bg-slate-50 rounded-lg border border-dashed border-indigo-200 overflow-hidden">
          <div class="flex flex-col items-center justify-center h-full text-indigo-300">
            <svg class="w-16 h-16 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path>
            </svg>
            <p class="mt-4 font-medium italic">
              Your interactive workspace is ready
            </p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let currentDays = 365 * 2;
    let currentTicker = "";
    let currentStrategy = "";
    let sourceStrategyName = ""; // tracks what strategy is being modified
    let scanAbortController = null;
    const LAST_COMPLETED_STRATEGY_KEY = "etf-discovery:last-completed-strategy";

    // --- Console Log Capture System ---
    const consoleLogs = [];
    const maxLogsBeforeSend = 50;
    
    function setupConsoleCapture() {
      const originalLog = console.log;
      const originalError = console.error;
      const originalWarn = console.warn;
      const originalInfo = console.info;
      
      const captureLog = (level, args) => {
        const timestamp = new Date().toISOString();
        const message = args.map(arg => {
          if (typeof arg === 'object') {
            try { return JSON.stringify(arg); } catch { return String(arg); }
          }
          return String(arg);
        }).join(' ');
        
        consoleLogs.push({ timestamp, level, message });
        if (consoleLogs.length >= maxLogsBeforeSend) {
          flushConsoleLogs();
        }
      };
      
      console.log = function(...args) {
        originalLog.apply(console, args);
        captureLog('LOG', args);
      };
      
      console.error = function(...args) {
        originalError.apply(console, args);
        captureLog('ERROR', args);
      };
      
      console.warn = function(...args) {
        originalWarn.apply(console, args);
        captureLog('WARN', args);
      };
      
      console.info = function(...args) {
        originalInfo.apply(console, args);
        captureLog('INFO', args);
      };
      
      // Flush remaining logs on page unload
      window.addEventListener('beforeunload', flushConsoleLogs);
      
      // Flush logs every 30 seconds
      setInterval(flushConsoleLogs, 30000);
    }
    
    async function flushConsoleLogs() {
      if (consoleLogs.length === 0) return;
      const logsToSend = [...consoleLogs];
      consoleLogs.length = 0;
      
      try {
        await fetch('/api/log/console', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ logs: logsToSend })
        });
      } catch (err) {
        // Silently fail to avoid infinite loops if logging fails
      }
    }
    
    // Start capturing console logs immediately
    setupConsoleCapture();

    // --- Toast notification ---
    function showToast(msg, isError = false) {
      const t = document.createElement("div");
      t.textContent = msg;
      t.className = `fixed bottom-6 right-6 ${isError ? 'bg-red-600' : 'bg-emerald-600'} text-white py-2 px-4 rounded-lg shadow-lg z-[200] text-sm font-bold transition-opacity`;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = "0"; setTimeout(() => t.remove(), 400); }, 2800);
    }

    function saveLastCompletedStrategy(strategyName) {
      try {
        if (strategyName) {
          localStorage.setItem(LAST_COMPLETED_STRATEGY_KEY, strategyName);
        } else {
          localStorage.removeItem(LAST_COMPLETED_STRATEGY_KEY);
        }
      } catch (err) {
        console.warn("Could not persist strategy selection", err);
      }
    }

    function loadLastCompletedStrategy() {
      try {
        return localStorage.getItem(LAST_COMPLETED_STRATEGY_KEY) || "";
      } catch (err) {
        console.warn("Could not read saved strategy selection", err);
        return "";
      }
    }

    async function restoreLastCompletedStrategy() {
      const strategySelect = document.getElementById("strategy-select");
      if (!strategySelect) {
        return "";
      }

      const savedStrategy = loadLastCompletedStrategy();
      if (!savedStrategy) {
        return "";
      }

      const hasOption = Array.from(strategySelect.options).some((opt) => opt.value === savedStrategy);
      if (!hasOption) {
        saveLastCompletedStrategy("");
        return "";
      }

      strategySelect.value = savedStrategy;
      currentStrategy = savedStrategy;
      await updateEditorContent(savedStrategy);
      return savedStrategy;
    }

    // --- Refresh strategies dropdown without full page reload ---
    async function refreshStrategiesDropdown(selectName = null) {
      try {
        const resp = await fetch("/api/strategies");
        const strategies = await resp.json();
        const sel = document.getElementById("strategy-select");
        const prev = selectName || sel.value;
        sel.innerHTML = '<option value="">-- No Active Strategy --</option>';
        strategies.forEach(s => {
          const opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s;
          sel.appendChild(opt);
        });
        if (prev) sel.value = prev;
      } catch (e) {
        console.error("Failed to refresh strategies dropdown", e);
      }
    }

    // UI Helpers
    function toggleStrategyPanel() {
      const panel = document.getElementById("strategy-panel");
      panel.classList.toggle("hidden");
    }

    async function updateEditorContent(strategyName) {
      const strategyEditor = document.getElementById("strategy-editor");
      const strategyFilename = document.getElementById("strategy-filename");

      // If the Labs editor is not mounted in this render, avoid throwing and
      // let the rest of the dashboard (including chart loading) continue.
      if (!strategyEditor || !strategyFilename) {
        console.warn("Strategy editor elements not found; skipping editor sync.");
        return;
      }

      if (!strategyName) {
        strategyEditor.value = "";
        strategyFilename.value = "";
        return;
      }
      try {
        const resp = await fetch(`/api/strategy/${encodeURIComponent(strategyName)}`);
        if (!resp.ok) {
          throw new Error("Failed to load strategy content");
        }
        const data = await resp.json();
        strategyEditor.value = data.content;
        strategyFilename.value = strategyName;
      } catch (err) {
        console.error("Failed to load strategy", err);
      }
    }

    // Opens a simple modal with the strategy DSL ready to edit.
    async function modifyStrategy() {
      const strategySelect = document.getElementById("strategy-select");
      const strategyName = strategySelect ? strategySelect.value : "";
      const modal = document.getElementById("modify-modal");
      if (!modal) {
        showToast("Modify dialog is missing from page.", true);
        return;
      }

      if (!strategyName) {
        // Fallback: allow editing current DSL text from Labs panel even without an active dropdown selection.
        const editor = document.getElementById("strategy-editor");
        const filename = document.getElementById("strategy-filename");
        const existingDsl = editor ? editor.value : "";
        const baseName = (filename && filename.value ? filename.value : "custom_strategy").trim() || "custom_strategy";

        document.getElementById("modify-modal-editor").value = existingDsl;
        document.getElementById("modify-modal-name").value = `${baseName}_v2`;
        document.getElementById("modify-modal-source").textContent = "Based on: unsaved editor content";
        sourceStrategyName = baseName;

        modal.style.display = "flex";
        document.getElementById("modify-modal-editor").focus();
        return;
      }

      // Open immediately, then load the exact file content for the selected strategy.
      document.getElementById("modify-modal-editor").value = "Loading strategy file...";
      document.getElementById("modify-modal-name").value = strategyName + "_v2";
      document.getElementById("modify-modal-source").textContent = "Based on: " + strategyName;
      sourceStrategyName = strategyName;
      modal.style.display = "flex";
      document.getElementById("modify-modal-editor").focus();

      try {
        const resp = await fetch(`/api/strategy/${encodeURIComponent(strategyName)}`);
        if (!resp.ok) {
          throw new Error("Failed to load selected strategy");
        }
        const data = await resp.json();
        document.getElementById("modify-modal-editor").value = data.content || "";
      } catch (err) {
        console.error("Failed to load selected strategy", err);
        document.getElementById("modify-modal-editor").value = "";
        showToast("Could not load selected strategy file.", true);
      }
    }

    function closeModifyModal() {
      document.getElementById("modify-modal").style.display = "none";
    }

    async function saveFromModal() {
      const name = document.getElementById("modify-modal-name").value.trim();
      const content = document.getElementById("modify-modal-editor").value;
      if (!name || !content) { showToast("Need both a name and DSL content!", true); return; }
      if (name === sourceStrategyName) {
        showToast(`Change the name first — "${name}" is the original.`, true);
        document.getElementById("modify-modal-name").focus();
        return;
      }
      await _doSave(name, content, name);
      closeModifyModal();
    }

    // Save As — requires a name that differs from the source
    async function saveAsStrategy() {
      const name = document.getElementById("strategy-filename").value.trim();
      const content = document.getElementById("strategy-editor").value;
      if (!name || !content) { showToast("Need both a name and DSL content!", true); return; }
      if (name === sourceStrategyName) {
        showToast(`Change the name first — "${name}" is the original.`, true);
        document.getElementById("strategy-filename").focus();
        return;
      }
      await _doSave(name, content, name);
    }

    // Overwrite — saves back to the exact source file
    async function saveStrategy() {
      const name = document.getElementById("strategy-filename").value.trim();
      const content = document.getElementById("strategy-editor").value;
      if (!name || !content) { showToast("Need both a name and DSL content!", true); return; }
      await _doSave(name, content, name);
    }

    async function _doSave(name, content, selectAfter) {
      try {
        const resp = await fetch('/api/strategy/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, content })
        });
        const res = await resp.json();
        if (resp.ok && res.status === 'success') {
          await refreshStrategiesDropdown(selectAfter);
          sourceStrategyName = name;
          document.getElementById("source-strategy-name").textContent = name;
          showToast(`Saved: ${name}.dsl`);
        } else {
          showToast("Error: " + (res.detail || 'Unknown error'), true);
        }
      } catch (err) {
        showToast("Save failed: " + err, true);
      }
    }

    async function applyDsl() {
      // Extract current DSL from editor and pass it to runScreen
      const dsl = document.getElementById("strategy-editor").value;
      if (!dsl.trim()) {
        alert("Please enter strategy DSL before applying.");
        return;
      }
      toggleStrategyPanel();
      // Pass true to indicate we're using custom DSL from active editor
      runScreen(dsl);
    }

    // Initial Load
    function cancelScan() {
      if (scanAbortController) {
        scanAbortController.abort();
        resetScanUI();
      }
    }

    function resetScanUI() {
      const spinner = document.getElementById("loading-spinner");
      const scanBtn = document.getElementById("scan-btn");
      const runBtn = document.getElementById("run-btn");
      const list = document.getElementById("ticker-list");
      const navProgress = document.getElementById("nav-scan-progress");
      const navProgressBar = document.getElementById("nav-scan-progress-bar");
      const navProgressText = document.getElementById("nav-scan-progress-text");

      if (spinner) spinner.classList.add("hidden");
      if (navProgress) navProgress.classList.add("hidden");
      if (navProgressBar) navProgressBar.style.width = "0%";
      if (navProgressText) navProgressText.textContent = "0%";

      if (scanBtn) {
        scanBtn.textContent = "Run Scanner";
        scanBtn.classList.add("bg-indigo-600");
        scanBtn.classList.remove("bg-indigo-400");
        scanBtn.disabled = false;
      }

      if (runBtn) {
        runBtn.innerHTML = `
            <svg class="w-3.5 h-3.5 mr-1" fill="currentColor" viewBox="0 0 24 24">
              <path d="M5 3l14 9-14 9V3z"></path>
            </svg>
            Run
          `;
        runBtn.classList.remove("bg-emerald-500", "cursor-wait");
        runBtn.classList.add("bg-green-600");
        runBtn.disabled = false;
      }

      if (list) list.style.opacity = "1.0";
      scanAbortController = null;
    }

    async function runScreen(customDsl = null) {
      const list = document.getElementById("ticker-list");
      const spinner = document.getElementById("loading-spinner");
      const scanBtn = document.getElementById("scan-btn");
      const runBtn = document.getElementById("run-btn");
      const strategySelect = document.getElementById("strategy-select");
      const errorSection = document.getElementById("error-section");
      const errorList = document.getElementById("error-list");
      const navProgress = document.getElementById("nav-scan-progress");
      const navProgressBar = document.getElementById("nav-scan-progress-bar");
      const navProgressText = document.getElementById("nav-scan-progress-text");

      // Set up abortion
      scanAbortController = new AbortController();

      if (spinner) spinner.classList.remove("hidden");
      if (navProgress) navProgress.classList.remove("hidden");
      if (navProgressBar) navProgressBar.style.width = "0%";
      if (navProgressText) navProgressText.textContent = "0%";

      if (scanBtn) {
        scanBtn.textContent = "Scanning...";
        scanBtn.classList.add("bg-indigo-400"); // De-emphasize while running
        scanBtn.classList.remove("bg-indigo-600");
        scanBtn.disabled = true;
      }

      if (runBtn) {
        runBtn.innerHTML = `
            <svg class="w-3.5 h-3.5 mr-1 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9" stroke-width="2" stroke-opacity="0.3"></circle>
              <path d="M21 12a9 9 0 00-9-9" stroke-width="2" stroke-linecap="round"></path>
            </svg>
            Running
          `;
        runBtn.classList.remove("bg-green-600");
        runBtn.classList.add("bg-emerald-500", "cursor-wait");
        runBtn.disabled = true;
      }

      if (list) list.style.opacity = "0.5";

      try {
        let url = "/api/screen";
        if (customDsl) {
          url += `?dsl_content=${encodeURIComponent(customDsl)}`;
          strategySelect.value = "";
          currentStrategy = "";
        } else if (strategySelect.value) {
          url += `?strategy=${strategySelect.value}`;
          currentStrategy = strategySelect.value;
        } else {
          currentStrategy = "";
        }
        console.log("Screen scan starting with URL:", url);
        console.log("Current strategy:", currentStrategy);

        // Fake progress since we wait for one big JSON result from backend
        // We'll tick it up slowly to give a sense of depth
        let fakeProg = 0;
        const progInterval = setInterval(() => {
          if (fakeProg < 95) {
            fakeProg += (95 - fakeProg) * 0.1;
            if (navProgressBar) navProgressBar.style.width = `${Math.round(fakeProg)}%`;
            if (navProgressText) navProgressText.textContent = `${Math.round(fakeProg)}%`;
          }
        }, 400);

        const resp = await fetch(url, { signal: scanAbortController.signal });
        console.log("Fetch response status:", resp.status, "URL:", url);
        clearInterval(progInterval);

        const rawData = await resp.json();
        if (!resp.ok) {
          throw new Error(rawData.detail || "Screen request failed");
        }
        console.log("JSON parsed successfully. Data keys:", Object.keys(rawData));

        // Complete the bar
        if (navProgressBar) navProgressBar.style.width = "100%";
        if (navProgressText) navProgressText.textContent = "100%";

        // Small delay to let user see 100%
        await new Promise(r => setTimeout(r, 500));
        resetScanUI();

        // Handle new response format
        const hasFormat = rawData.matches !== undefined;
        const matches = hasFormat ? rawData.matches : rawData;
        const errors = hasFormat ? rawData.errors : [];
        console.log("Data format check - hasFormat:", hasFormat, "matches count:", matches?.length, "errors count:", errors?.length);

        if (!customDsl) {
          saveLastCompletedStrategy(currentStrategy);
        }

        if (!Array.isArray(matches)) {
          console.error("ERROR: matches is not an array!", typeof matches, matches);
          throw new Error("Expected matches to be an array, got " + typeof matches);
        }

        list.innerHTML = "";
        document.getElementById("match-count").textContent = matches.length;
        console.log("List cleared, match count updated to:", matches.length);

        // Update ticker dropdown options based on screen results
        const tickerSelect = document.getElementById("ticker-select");
        if (matches.length > 0 && (strategySelect.value || customDsl)) {
          const currentVal = tickerSelect.value;
          tickerSelect.innerHTML =
            '<option value="">Select Ticker...</option>';
          matches.forEach((item) => {
            const opt = document.createElement("option");
            opt.value = item.ticker;
            opt.textContent = item.ticker;
            tickerSelect.appendChild(opt);
          });
          if (
            currentVal &&
            matches.some((item) => item.ticker === currentVal)
          ) {
            tickerSelect.value = currentVal;
          }
        }

        // Display errors if any
        if (errors && errors.length > 0) {
          errorSection.classList.remove("hidden");
          document.getElementById("error-count").textContent =
            rawData.total_errors || errors.length;
          errorList.innerHTML = errors
            .map(
              (err) => `
                        <div class="mb-1 border-b border-slate-50 pb-1">
                            <span class="font-bold text-slate-700">${err.ticker}</span>: 
                            <span class="text-red-400 capitalize">${err.error}</span>
                        </div>
                    `,
            )
            .join("");
        } else {
          errorSection.classList.add("hidden");
        }

        if (matches.length === 0) {
          list.innerHTML =
            '<div class="text-sm text-slate-400 italic p-4 text-center">No matching ETFs found for this strategy...</div>';
        }

        matches.forEach((item, idx) => {
          try {
            const card = document.createElement("div");
            card.className =
              "ticker-card p-3 bg-slate-50 border-l-4 border-indigo-500 rounded shadow-sm hover:shadow-md hover:bg-indigo-50 cursor-pointer transition-all";
            card.onclick = () => loadChart(item.ticker);
            const statusText = item.status || "TRENDING";
            const statusColor =
              item.status === "Entry Signal"
                ? "text-emerald-500 animate-pulse font-bold"
                : "text-indigo-600";

            const closeVal = Number(item.close ?? 0);
            const volumeVal = Number(item.volume ?? 0);
            const returnPctVal = Number(item.return_pct ?? 0);
            const changePctVal = Number(item.change_pct ?? 0);
            const scoreVal = Number(item.score ?? 0);

            const changeVal = Number.isFinite(changePctVal)
              ? changePctVal.toFixed(2)
              : "0.00";
            const changeColor =
              parseFloat(changeVal) >= 0 ? "text-emerald-500" : "text-rose-500";
            const sign = parseFloat(changeVal) >= 0 ? "+" : "";

            card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div class="flex flex-col">
                                <div class="flex items-baseline gap-1.5">
                                  <span class="font-bold text-slate-800 text-lg leading-none">${item.ticker}</span>
                                  <span class="text-[10px] font-bold text-indigo-400">#${idx + 1}</span>
                                </div>
                                <span class="text-[10px] ${statusColor} mt-1 uppercase tracking-wider">${statusText}</span>
                            </div>
                            <div class="flex flex-col items-end">
                              <span class="text-slate-800 font-bold font-mono">${closeVal.toFixed(2)}€</span>
                                <span class="text-[10px] ${changeColor} font-mono">${sign}${changeVal}%</span>
                            </div>
                        </div>
                        <div class="mt-2 pt-2 border-t border-slate-200/50 flex justify-between items-center">
                            <div class="text-[10px] text-slate-400 font-semibold">
                              ${(volumeVal / 1000).toFixed(0)}K VOLUME
                            </div>
                            <div class="text-[10px] font-bold text-indigo-600">
                              ${(scoreVal * 100).toFixed(0)} pts
                            </div>
                        </div>
                    `;
            list.appendChild(card);
            console.log(`Card ${idx} added for ${item.ticker}`);
          } catch (cardErr) {
            console.error(`Error processing card at index ${idx}:`, cardErr);
            console.error("Item data:", item);
          }
        });
        console.log("All cards processed successfully");
      } catch (err) {
        const errMsg = err instanceof Error ? err.message : String(err);
        const errStack = err instanceof Error ? err.stack : "No stack trace";
        console.error("=== SCREEN SCAN ERROR ===");
        console.error("Message:", errMsg);
        console.error("Stack:", errStack);
        console.error("Full Error Object:", err);
        if (list) {
          list.innerHTML =
            `<div class="text-xs text-red-500 p-2">Screen error: ${errMsg}<br/><span class="text-[9px] text-slate-500">Check console for details.</span></div>`;
        }
      } finally {
        resetScanUI();
      }
    }

    async function loadChart(ticker) {
      console.log("loadChart starting for", ticker);
      currentTicker = ticker;
      document.getElementById("active-ticker-title").textContent =
        `${ticker} - Supertrend breakdown analysis`;
      document.getElementById("ticker-select").value = ticker;

      const chartDiv = document.getElementById("plotly-chart");
      chartDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
                    <div id="loading-status" class="text-indigo-600 font-medium text-sm animate-pulse uppercase tracking-widest text-center">
                        Fetching live data for ${ticker}...
                    </div>
                </div>
            `;

      try {
        const strategySelect = document.getElementById("strategy-select");
        const strategyName = (strategySelect && strategySelect.value) ? strategySelect.value : currentStrategy;
        const strategyPart = strategyName ? `&strategy=${encodeURIComponent(strategyName)}` : "";
        const url = `/api/chart/${ticker}?days=${currentDays}${strategyPart}`;
        console.info("loadChart request URL", url);
        const resp = await fetch(url);
        const responseData = await resp.json();
        console.info("loadChart response status", resp.status);

        if (!resp.ok) throw new Error(responseData.detail || "Server error");

        let figData = null;
        if (responseData.figure) {
          try {
            figData = typeof responseData.figure === "string"
              ? JSON.parse(responseData.figure)
              : responseData.figure;
          } catch (e) {
            console.warn("Figure JSON parse failed, falling back to data/layout", e);
          }
        }
        if (!figData || !figData.data || !figData.layout) {
          figData = {
            data: responseData.data || [],
            layout: responseData.layout || {}
          };
        }

        console.info("loadChart payload summary", {
          ticker,
          traces: (figData.data || []).length,
          layoutKeys: Object.keys(figData.layout || {}).length,
        });

        if (!figData.data || figData.data.length === 0) {
          throw new Error("No chart traces returned by server.");
        }

        // Reset responsive layout
        figData.layout.autosize = true;
        figData.layout.width = undefined;
        figData.layout.height = undefined;
        if (!figData.layout.margin) {
          figData.layout.margin = { l: 60, r: 20, t: 30, b: 80 };
        }
        figData.layout.paper_bgcolor = "#ffffff";
        figData.layout.plot_bgcolor = "#ffffff";

        // Preserve backend axis label visibility rules (e.g., bottom-only timeline).
        // Only fill in minimal defaults when not provided.
        Object.keys(figData.layout).forEach((key) => {
          if (key.startsWith("xaxis")) {
            if (figData.layout[key].visible === undefined) {
              figData.layout[key].visible = true;
            }
            if (figData.layout[key].tickfont === undefined) {
              figData.layout[key].tickfont = {
                size: 11,
                color: "#334155",
              };
            }
          }
        });

        chartDiv.innerHTML = "";
        await Plotly.newPlot(chartDiv, figData.data, figData.layout, {
          responsive: true,
          displaylogo: false,
          scrollZoom: true,
        });
        console.info("loadChart render complete", ticker);
      } catch (err) {
        console.error("loadChart error:", err);
        chartDiv.innerHTML = `<div class="p-8 text-center text-red-500">${err.message}</div>`;
      }
    }

    function setRange(days) {
      currentDays = days;
      if (currentTicker) loadChart(currentTicker);
    }

    document
      .getElementById("ticker-select")
      .addEventListener("change", (e) => {
        if (e.target.value) loadChart(e.target.value);
      });

    document
      .getElementById("strategy-select")
      .addEventListener("change", (e) => {
        updateEditorContent(e.target.value);
        currentStrategy = e.target.value || "";
        runScreen(); // Restore runScreen() on strategy change
        if (currentTicker) {
          loadChart(currentTicker);
        }
      });

    // Initialize
    (async function initializeDashboard() {
      const restoredStrategy = await restoreLastCompletedStrategy();
      if (restoredStrategy) {
        console.info("Restored last completed strategy", restoredStrategy);
      }
      runScreen();
    })();

    function testMe() {
      const dsl = document.getElementById("strategy-editor").value;
      alert("Prototype Working!\n\nCurrent Editor Text:\n" + dsl);
    }

  </script>

  <!-- ===============================================================
         Browser → Server log relay
         Intercepts console.log / warn / error / info / debug and POSTs
         each entry to /api/log so it appears in the server-side debug
         log file alongside all Python / uvicorn log records.
    ================================================================ -->
  <script>
    (function () {
      const LOG_ENDPOINT = "/api/log";
      // Keep reference to original methods before we wrap them
      const _orig = {
        log: console.log.bind(console),
        info: console.info.bind(console),
        warn: console.warn.bind(console),
        error: console.error.bind(console),
        debug: console.debug.bind(console),
      };

      let _sending = false; // guard against recursive logging inside fetch()

      function sendLog(level, args) {
        if (_sending) return;
        try {
          const message = args
            .map((a) => {
              if (a instanceof Error) {
                return `${a.name}: ${a.message}`;
              }
              if (typeof a === "object" && a !== null) {
                try {
                  return JSON.stringify(a, null, 2);
                } catch (_) {
                  return String(a);
                }
              }
              return String(a);
            })
            .join(" ");

          // Capture stack for errors
          let stack = null;
          if (level === "error") {
            const errArg = args.find((a) => a instanceof Error);
            if (errArg?.stack) {
              stack = errArg.stack;
            } else {
              try { stack = new Error().stack; } catch (_) { }
            }
          }

          _sending = true;
          fetch(LOG_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            // keepalive: true so the request survives page unload
            keepalive: true,
            body: JSON.stringify({
              level,
              message,
              stack,
              url: window.location.href,
              line: "",
            }),
          }).finally(() => { _sending = false; });
        } catch (_) {
          _sending = false;
        }
      }

      // Wrap each console method
      ["log", "info", "warn", "error", "debug"].forEach((method) => {
        console[method] = function (...args) {
          _orig[method](...args); // still write to DevTools
          sendLog(method === "log" ? "info" : method, args);
        };
      });

      // Also capture uncaught JS errors
      window.addEventListener("error", (event) => {
        sendLog("error", [
          `Uncaught ${event.message}`,
          `at ${event.filename}:${event.lineno}:${event.colno}`,
        ]);
      });

      // And unhandled promise rejections
      window.addEventListener("unhandledrejection", (event) => {
        sendLog("error", [
          "Unhandled promise rejection:",
          event.reason instanceof Error
            ? event.reason.message
            : String(event.reason),
        ]);
      });

      _orig.info("[ETF-Logger] Browser console → /api/log relay active");
    })();
  </script>

  <!-- Modify Strategy Modal — direct body child so fixed+z-index always works -->
  <div id="modify-modal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:9999;align-items:center;justify-content:center;padding:1rem"
    onclick="if(event.target===this)closeModifyModal()">
    <div
      style="background:#0f172a;border:1px solid rgba(99,102,241,0.35);border-radius:0.75rem;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 25px 50px rgba(0,0,0,0.6)">
      <!-- Header -->
      <div
        style="display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;background:#1e293b;border-bottom:1px solid rgba(99,102,241,0.2);border-radius:0.75rem 0.75rem 0 0">
        <div>
          <div style="color:#fff;font-weight:700;font-size:0.875rem">Modify Strategy</div>
          <div id="modify-modal-source" style="color:#fbbf24;font-size:0.7rem;font-family:monospace;margin-top:2px">
          </div>
        </div>
        <button onclick="closeModifyModal()"
          style="color:#94a3b8;font-size:1.5rem;line-height:1;background:none;border:none;cursor:pointer"
          title="Close">&times;</button>
      </div>
      <!-- Body -->
      <div style="flex:1;padding:1.25rem;display:flex;flex-direction:column;gap:0.75rem;overflow:auto">
        <textarea id="modify-modal-editor" spellcheck="false"
          style="flex:1;min-height:260px;background:#020617;color:#a5b4fc;font-family:monospace;font-size:0.875rem;padding:1rem;border-radius:0.375rem;border:1px solid rgba(99,102,241,0.25);outline:none;resize:vertical;width:100%;box-sizing:border-box"></textarea>
        <!-- Footer row -->
        <div style="display:flex;gap:0.75rem;align-items:flex-end">
          <div style="flex:1">
            <label
              style="display:block;font-size:0.65rem;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:4px">Save
              As Name</label>
            <input id="modify-modal-name" type="text" placeholder="my_strategy_v2"
              style="width:100%;background:#1e293b;color:#fff;font-size:0.875rem;padding:0.5rem;border-radius:0.375rem;border:1px solid rgba(99,102,241,0.25);outline:none;box-sizing:border-box">
          </div>
          <div style="display:flex;gap:0.5rem">
            <button onclick="saveFromModal()"
              style="background:#059669;color:#fff;font-weight:700;padding:0.5rem 1.25rem;border-radius:0.375rem;border:none;cursor:pointer;font-size:0.875rem;white-space:nowrap"
              onmouseover="this.style.background='#10b981'" onmouseout="this.style.background='#059669'">Save
              As</button>
            <button onclick="closeModifyModal()"
              style="background:#334155;color:#fff;font-weight:700;padding:0.5rem 1rem;border-radius:0.375rem;border:none;cursor:pointer;font-size:0.875rem"
              onmouseover="this.style.background='#475569'" onmouseout="this.style.background='#334155'">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
